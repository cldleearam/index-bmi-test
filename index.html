<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>BMI Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #74ebd5, #ACB6E5);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
      width: 300px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 20px;
      border: none;
      background: #4CAF50;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #45a049;
    }

    .result {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>BMI Calculator</h2>

  <input type="number" id="weight" placeholder="น้ำหนัก (kg)">
  <input type="number" id="height" placeholder="ส่วนสูง (cm)">

  <button onclick="calculateBMI()">คำนวณ</button>

  <div class="result" id="result"></div>
</div>

<script>
function calculateBMI() {
  let weight = document.getElementById("weight").value;
  let height = document.getElementById("height").value;

  if (!weight || !height) {
    document.getElementById("result").innerText = "กรุณากรอกข้อมูลให้ครบ";
    return;
  }

  height = height / 100; // cm → m
  let bmi = weight / (height * height);

  let category = "";

  if (bmi < 18.5) {
    category = "ผอม";
  } else if (bmi < 24.9) {
    category = "ปกติ";
  } else if (bmi < 29.9) {
    category = "อ้วน";
  } else {
    category = "อ้วนมาก";
  }

  document.getElementById("result").innerText =
    "BMI = " + bmi.toFixed(2) + " (" + category + ")";
}
</script>

</body>
</html>
